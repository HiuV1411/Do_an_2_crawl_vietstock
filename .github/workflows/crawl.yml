name: CafeF News Crawler

on:
  schedule:
    # 08:30 ICT = 01:30 UTC
    - cron: '30 1 * * *'
    # 18:30 ICT = 11:30 UTC
    - cron: '30 11 * * *'

  # Cho phép chạy thủ công từ tab Actions trên GitHub (để test)
  workflow_dispatch:
    inputs:
      session:
        description: 'Phiên crawl (MORNING / EVENING / MANUAL)'
        required: false
        default: 'MANUAL'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Tạo thư mục runtime
        run: mkdir -p data logs

      - name: Restore dedup database từ cache
        uses: actions/cache@v4
        with:
          path: data/seen_urls.db
          key: seen-urls-db-${{ github.run_id }}
          restore-keys: |
            seen-urls-db-

      - name: Xác định phiên crawl
        id: session
        run: |
          # Nếu chạy thủ công thì dùng input, ngược lại tự xác định theo giờ UTC
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$HOUR" = "01" ]; then
              echo "name=MORNING" >> $GITHUB_OUTPUT
            else
              echo "name=EVENING" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Chạy crawler
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SOURCE_ID: CAFEF
          INDUSTRY_GROUP: ${{ secrets.INDUSTRY_GROUP }}
          MAX_PAGES: 5
          REQUEST_DELAY: 2
          REQUEST_TIMEOUT: 30
          MAX_RETRIES: 3
        run: python main.py --session ${{ steps.session.outputs.name }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
