name: Vietstock Daily Crawler

on:
  # ----------------------------------------------------------------
  # Chạy tự động 2 lần/ngày theo giờ Việt Nam (UTC+7)
  #   10:00 ICT = 03:00 UTC
  #   20:30 ICT = 13:30 UTC
  # ----------------------------------------------------------------
  schedule:
    - cron: "0 3 * * *"
    - cron: "30 13 * * *"

  # Cho phép chạy thủ công từ tab Actions (rất hữu ích khi demo)
  workflow_dispatch:

jobs:
  crawl:
    name: Crawl Vietstock News
    runs-on: ubuntu-latest
    timeout-minutes: 20       # Tối đa 20 phút, tránh job treo vô hạn

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"          # Cache dependencies → lần sau nhanh hơn

      # 3. Cài thư viện
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Chạy pipeline chính
      #    Credentials được inject từ GitHub Secrets (không bao giờ xuất hiện trong log)
      - name: Run crawler pipeline
        env:
          GSPREAD_CREDS: ${{ secrets.GSPREAD_CREDS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          INDUSTRY_GROUP: ${{ secrets.INDUSTRY_GROUP }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
        run: python -m src.pipeline.runner

      # 5. Upload log file nếu có (để debug khi cần)
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7